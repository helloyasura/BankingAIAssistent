services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      PYTHONPATH: backend
      HITL_AUTO_APPROVE: "true"
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health')"]
      interval: 10s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "8501:8501"
    environment:
      API_BASE_URL: http://backend:8000/api/v1
    depends_on:
      backend:
        condition: service_healthy

  mcp_server:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./mcp_server:/app/mcp_server
    command: ["python", "-c", "print('MCP mock data mounted; tools run in-process via backend.')"]
    profiles:
      - optional
